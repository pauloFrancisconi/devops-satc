name: Docker Image Check

on:
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

jobs:
  docker-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=pauloFrancisconi_devops-satc  
            -Dsonar.organization=paulofrancisconi           
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}     
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/satc-devops:0.0.1 .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/satc-devops:0.0.1


      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/satc-devops:0.0.1'  
          format: json
          output: trivy-results.json
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Analyze Trivy results
        run: |
          if [ -f trivy-results.json ]; then
            VULN_COUNT=$(jq '[.Results[].Vulnerabilities[] | select(.Severity == "MEDIUM")] | length' trivy-results.json)
            echo "Quantidade de vulnerabilidades medias: $VULN_COUNT"

            if [ "$VULN_COUNT" -gt 2 ]; then
              echo "Pipeline bloqueada: mais de 2 vulnerabilidades medias encontradas."
              exit 1
            fi
          else
            echo "Arquivo de resultados do Trivy nao encontrado."
            exit 1
          fi

      - name: Falhar se houver mais de 2 vulnerabilidades medias
        run: |
          COUNT=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&severities=MAJOR&resolved=false&ps=1" \
            | jq '.total')

          echo "Quantidade de vulnerabilidades medias: $COUNT"

          if [ "$COUNT" -gt 2 ]; then
            echo "Pipeline bloqueada: mais de 2 vulnerabilidades medias encontradas."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: pauloFrancisconi_devops-satc
